services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: disaster_alpha
    ports:
      - "5432:5432"
    volumes:
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/disaster_alpha
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis

  analytics:
    build: ./analytics
    ports:
      - "8000:8000"
    depends_on:
      - redis
